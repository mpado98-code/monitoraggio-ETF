name: Invia Report Mercati

on:
  schedule:
    # Martedì alle 17:45 italiane
    - cron: '45 16 * * 2'  # Inverno (CET): 16 UTC = 17:45 Italia
    - cron: '45 15 * * 2'  # Estate (CEST): 15 UTC = 17:45 Italia

    # Giovedì alle 17:45 italiane
    - cron: '45 16 * * 4'  # Inverno (CET)
    - cron: '45 15 * * 4'  # Estate (CEST)

  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica il repository
        uses: actions/checkout@v3

      - name: Configura Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installa dipendenze
        run: |
          pip install -r requirements.txt
      
      - name: Esegui monitoraggio
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitoraggio.py